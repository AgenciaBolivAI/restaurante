services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurante-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-restaurante}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-restaurante_dev}
      POSTGRES_DB: ${POSTGRES_DB:-restaurante}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-restaurante}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
